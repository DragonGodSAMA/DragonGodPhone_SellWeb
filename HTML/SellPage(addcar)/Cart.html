<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Cart - DragonGod Phone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cart-empty { text-align:center;padding:60px 20px;color:#6b7280 }
        .line { height:1px;background:#eef2f7;margin:12px 0 }
        .item-row { display:flex;gap:12px;align-items:center }
        .thumb { width:84px;height:84px;background:#f8fafc;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-5xl mx-auto p-6">
        <div style="display:flex;align-items:center;justify-content:space-between">
            <h1 class="text-2xl font-semibold mb-4">Shopping Cart</h1>
            <button id="backButton" class="px-3 py-1 border rounded bg-white">Back</button>
        </div>

        <div id="cartRoot" class="bg-white rounded-lg shadow-sm p-6"></div>
    </div>

    <template id="itemT">
        <div class="item-row py-4">
            <div class="thumb"><img src="" alt="thumb" class="w-full h-full object-contain"></div>
            <div style="flex:1">
                <div class="font-medium name"></div>
                <div class="text-sm text-gray-500">Color: <span class="color"></span> · Storage: <span class="storage"></span></div>
            </div>
            <div style="width:140px;text-align:right">
                <div class="text-sm text-gray-500">Unit price</div>
                <div class="font-semibold price">¥0</div>
            </div>
            <div style="width:140px;text-align:center">
                <div class="flex items-center justify-center gap-2">
                    <button class="dec px-2 py-1 bg-gray-100 rounded">-</button>
                    <input class="qty w-12 text-center border rounded" value="1">
                    <button class="inc px-2 py-1 bg-gray-100 rounded">+</button>
                </div>
                <div style="margin-top:8px"><button class="remove text-sm text-red-600">Remove</button></div>
            </div>
            <div style="width:140px;text-align:right">
                <div class="text-sm text-gray-500">Subtotal</div>
                <div class="font-semibold subtotal">¥0</div>
            </div>
        </div>
    </template>

    <script>
        const root = document.getElementById('cartRoot');
        const tpl = document.getElementById('itemT');

        function renderCart() {
            const cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
            root.innerHTML = '';
            if (cart.length === 0) {
                root.innerHTML = '<div class="cart-empty">Your shopping cart is empty. Go <a href="/HTML/HomePages/index.html" class="text-blue-600">browse</a>.</div>';
                return;
            }

            let total = 0;
            cart.forEach((it, idx) => {
                const node = tpl.content.cloneNode(true);
                node.querySelector('img').src = it.image || '/Recourses/HomePage/hero-device.svg';
                node.querySelector('.name').textContent = it.name;
                node.querySelector('.color').textContent = it.color || '-';
                node.querySelector('.storage').textContent = it.storage || '-';
                node.querySelector('.price').textContent = '¥' + Number(it.unit_price || 0).toLocaleString();
                node.querySelector('.qty').value = it.quantity || 1;
                node.querySelector('.subtotal').textContent = '¥' + Number(it.total || 0).toLocaleString();

                const dec = node.querySelector('.dec');
                const inc = node.querySelector('.inc');
                const qty = node.querySelector('.qty');
                const remove = node.querySelector('.remove');

                dec.addEventListener('click', () => { qty.value = Math.max(1, Number(qty.value) - 1); updateQty(idx, qty.value); });
                inc.addEventListener('click', () => { qty.value = Number(qty.value) + 1; updateQty(idx, qty.value); });
                qty.addEventListener('change', () => { qty.value = Math.max(1, Number(qty.value)); updateQty(idx, qty.value); });
                remove.addEventListener('click', () => { removeItem(idx); });

                root.appendChild(node);
                total += Number(it.total || 0);
            });

            const footer = document.createElement('div');
            footer.className = 'mt-6 p-4 border-t';
                footer.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center"><div class="text-lg">Total: <strong>¥${total.toLocaleString()}</strong></div><div><button id="checkout" class="px-4 py-2 bg-red-600 text-white rounded">Checkout</button></div></div>`;
            root.appendChild(footer);

            document.getElementById('checkout').addEventListener('click', async () => {
                const user = localStorage.getItem('loggedInUser');
                const role = localStorage.getItem('userRole') || 'Buyer';
                if (!user) { alert('Please log in with a Buyer account to continue'); window.location.href='/HTML/Login&Registration/Login.html'; return; }

                const cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
                if (!cart || cart.length === 0) {
                    alert('Cart is empty');
                    return;
                }

                // Try to persist seller-transaction items to server when possible
                const serverResults = [];
                for (const it of cart) {
                    if (!it.listingId) {
                        // skip server submit for generic items
                        serverResults.push({ ok: false, message: 'No listingId, skipped server submit', item: it.name });
                        continue;
                    }

                    const form = new URLSearchParams();
                    form.append('listingId', it.listingId);
                    form.append('actionType', 'add_to_cart');
                    form.append('buyerName', user);
                    form.append('buyerRole', role);
                    form.append('selectedColor', it.color || '');
                    form.append('selectedStorage', it.storage || '');
                    form.append('selectedServices', JSON.stringify([]));
                    form.append('quantity', String(it.quantity || 1));

                    try {
                        const resp = await fetch('/PHP/submit_seller_transaction.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: form.toString()
                        });
                        const json = await resp.json();
                        serverResults.push(json);
                    } catch (e) {
                        serverResults.push({ ok: false, message: 'Network or server error', error: String(e) });
                    }
                }

                // After server attempts, clear client cart and update UI
                localStorage.removeItem('shoppingCart');
                if (window.DG_updateCartBadges) window.DG_updateCartBadges();
                renderCart();

                // Show brief results
                const successCount = serverResults.filter(r => r && r.ok).length;
                    alert(`Checkout processed locally. Server recorded successes: ${successCount} items.`);
            });
        }

        function updateQty(index, qty) {
            const cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
            if (!cart[index]) return;
            cart[index].quantity = Number(qty);
            cart[index].total = Number(cart[index].unit_price || 0) * cart[index].quantity;
            localStorage.setItem('shoppingCart', JSON.stringify(cart));
            if (window.DG_updateCartBadges) window.DG_updateCartBadges();
            renderCart();
        }

        function removeItem(index) {
            const cart = JSON.parse(localStorage.getItem('shoppingCart') || '[]');
            cart.splice(index,1);
            localStorage.setItem('shoppingCart', JSON.stringify(cart));
            if (window.DG_updateCartBadges) window.DG_updateCartBadges();
            renderCart();
        }

        document.addEventListener('DOMContentLoaded', renderCart);
        document.getElementById('backButton').addEventListener('click', () => { window.history.back(); });
    </script>
</body>
</html>
