<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DragonGod Phone - Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Header - 与全站完全统一 */
        .page-header {
            background-color: #f5f5f5;
            padding: 18px 60px;
            display: flex;
            align-items: center;
        }
        .brand-logo-text {
            font-size: 22px;
            font-weight: 700;
            color: #222222;
            letter-spacing: 1px;
            text-decoration: none;
        }

        /* 页面主标题 */
        .form-main-title {
            font-size: 32px;
            font-weight: 500;
            color: #222222;
            text-align: center;
            margin-bottom: 30px;
        }

        /* 主内容容器 - 与全站单栏表单宽度统一 */
        .reset-container {
            width: 100%;
            max-width: 460px;
            margin: 30px auto 0;
            padding: 0 20px;
        }

        /* 表单输入项样式 - 与全站完全统一 */
        .form-item {
            margin-bottom: 20px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            gap: 10px;
        }
        .form-input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            background-color: #f5f5f5;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            color: #333;
        }
        .form-input:focus {
            outline: none;
            background-color: #eeeeee;
        }
        .form-input::placeholder {
            color: #999999;
        }

        /* 验证码输入框适配 */
        .form-input.code-input {
            flex: 1;
        }

        /* 获取验证码按钮 - 与全站统一 */
        .get-code-btn {
            height: 48px;
            padding: 0 20px;
            background-color: #f5f5f5;
            color: #0066cc;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s;
        }
        .get-code-btn:hover {
            background-color: #eeeeee;
        }
        .get-code-btn:disabled {
            color: #999999;
            cursor: not-allowed;
        }

        /* 主操作按钮 - 与全站主按钮完全统一 */
        .action-submit-btn {
            width: 100%;
            height: 48px;
            background-color: #e89aa0;
            color: #ffffff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s ease;
            margin-bottom: 28px;
        }
        .action-submit-btn:hover {
            opacity: 0.92;
        }

        /* 密码可见切换按钮 - 与登录页完全统一 */
        .eye-toggle-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #666666;
        }

        /* 返回登录链接 */
        .back-to-login {
            display: block;
            text-align: center;
            font-size: 14px;
            color: #0066cc;
            text-decoration: none;
        }
        .back-to-login:hover {
            text-decoration: underline;
        }

        /* 表单提示信息样式 */
        .form-message {
            font-size: 12px;
            margin-top: 6px;
            min-height: 18px;
        }
        .error-text { color: #e53e3e; }
        .success-text { color: #38a169; }

        /* 分隔线通用样式 - 与全站统一 */
        .link-divider {
            color: #dddddd;
            line-height: 1;
        }

        /* Footer - 与全站完全统一 */
        .page-footer {
            background-color: #f5f5f5;
            padding: 24px 0;
            margin-top: 80px;
            text-align: center;
            font-size: 12px;
            color: #666666;
        }
        .footer-links {
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .footer-links a {
            color: #666666;
            text-decoration: none;
            margin: 0 12px;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        .footer-copyright {
            color: #999999;
        }

        /* 响应式适配 - 与全站完全统一 */
        @media (max-width: 768px) {
            .page-header {
                padding: 18px 20px;
            }
            .form-main-title {
                font-size: 24px;
                margin-bottom: 20px;
            }
            .footer-links a {
                margin: 0 6px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="page-header">
        <a href="../HomePage_Chen Hetian/index.html" class="brand-logo-text">DragonGod Phone</a>
    </header>

    <!-- 主内容区 -->
    <h1 class="form-main-title">Forgot Password</h1>

    <main class="reset-container">
        <!-- 第一步：验证身份 -->
        <div id="step-verify">
            <div class="form-item">
                <input type="text" class="form-input" id="accountInput" placeholder="Enter registered Email / Phone Number">
                <div class="form-message error-text" id="accountMsg"></div>
            </div>

            <div class="form-item">
                <div class="input-wrapper">
                    <input type="text" class="form-input code-input" id="codeInput" placeholder="Verification Code">
                    <button class="get-code-btn" id="getCodeBtn">Get Code</button>
                </div>
                <div class="form-message error-text" id="codeMsg"></div>
            </div>

            <button class="action-submit-btn" id="verifyBtn">Next Step</button>
        </div>

        <!-- 第二步：重置新密码（初始隐藏） -->
        <div id="step-reset" style="display: none;">
            <div class="form-item">
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="newPwdInput" placeholder="Enter new password">
                    <button class="eye-toggle-btn" id="eyeNewPwd">
                        <i class="fa-solid fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="form-item">
                <div class="input-wrapper">
                    <input type="password" class="form-input" id="confirmPwdInput" placeholder="Confirm new password">
                    <button class="eye-toggle-btn" id="eyeConfirmPwd">
                        <i class="fa-solid fa-eye-slash"></i>
                    </button>
                </div>
                <div class="form-message error-text" id="resetMsg"></div>
            </div>

            <button class="action-submit-btn" id="resetBtn">Reset Password</button>
        </div>

        <!-- 返回登录页链接 -->
        <a href="Login.html" class="back-to-login">
            <i class="fa-solid fa-arrow-left"></i> Back to Login
        </a>
    </main>

    <!-- 页脚 -->
    <footer class="page-footer">
        <div class="footer-links">
            <a href="User.html">User Agreement</a>
            <span class="link-divider">|</span>
            <a href="Privacy.html">Privacy Policy</a>
            <span class="link-divider">|</span>
            <a href="FAQ.html">FAQ</a>
            <span class="link-divider">|</span>
            <a href="Cookies.html">Cookies</a>
        </div>
        <div class="footer-copyright">Copyright © 2011-2026 DragonGod Phone. All rights reserved.</div>
    </footer>

    <script>
        // DOM元素获取
        const accountInput = document.getElementById('accountInput');
        const codeInput = document.getElementById('codeInput');
        const getCodeBtn = document.getElementById('getCodeBtn');
        const verifyBtn = document.getElementById('verifyBtn');
        const stepVerify = document.getElementById('step-verify');
        const stepReset = document.getElementById('step-reset');
        
        // 第二步重置密码元素
        const newPwdInput = document.getElementById('newPwdInput');
        const confirmPwdInput = document.getElementById('confirmPwdInput');
        const resetBtn = document.getElementById('resetBtn');
        const eyeNewPwd = document.getElementById('eyeNewPwd');
        const eyeConfirmPwd = document.getElementById('eyeConfirmPwd');

        // 倒计时配置
        let countdown = 60;
        let timer = null;

        // 密码可见切换通用函数
        function togglePwdVisibility(input, btnIcon) {
            if(input.type === 'password'){
                input.type = 'text';
                btnIcon.classList.remove('fa-eye-slash');
                btnIcon.classList.add('fa-eye');
            }else{
                input.type = 'password';
                btnIcon.classList.remove('fa-eye');
                btnIcon.classList.add('fa-eye-slash');
            }
        }

        // 绑定密码可见切换事件
        eyeNewPwd.addEventListener('click', () => togglePwdVisibility(newPwdInput, eyeNewPwd.querySelector('i')));
        eyeConfirmPwd.addEventListener('click', () => togglePwdVisibility(confirmPwdInput, eyeConfirmPwd.querySelector('i')));

        // 输入框输入时隐藏错误提示
        accountInput.addEventListener('input', () => document.getElementById('accountMsg').textContent = '');
        codeInput.addEventListener('input', () => document.getElementById('codeMsg').textContent = '');
        newPwdInput.addEventListener('input', () => document.getElementById('resetMsg').textContent = '');
        confirmPwdInput.addEventListener('input', () => document.getElementById('resetMsg').textContent = '');

        // 获取验证码逻辑
        getCodeBtn.addEventListener('click', function() {
            const account = accountInput.value.trim();
            if(!account) {
                document.getElementById('accountMsg').textContent = 'Please enter your registered Email or Phone Number';
                return;
            }
            document.getElementById('accountMsg').textContent = '';
            
            // 模拟发送验证码
            alert(`Verification code has been sent to ${account} (Mock code: 123456)`);
            
            // 启动倒计时
            getCodeBtn.disabled = true;
            timer = setInterval(() => {
                countdown--;
                getCodeBtn.textContent = `${countdown}s`;
                if(countdown <= 0) {
                    clearInterval(timer);
                    getCodeBtn.disabled = false;
                    getCodeBtn.textContent = 'Get Code';
                    countdown = 60;
                }
            }, 1000);
        });

        // 验证并进入下一步
        verifyBtn.addEventListener('click', function() {
            const account = accountInput.value.trim();
            const code = codeInput.value.trim();
            
            // 表单验证
            if(!account) {
                document.getElementById('accountMsg').textContent = 'Please enter your registered account';
                return;
            }
            if(!code) {
                document.getElementById('codeMsg').textContent = 'Please enter verification code';
                return;
            }
            
            // 验证通过，切换到重置密码步骤
            stepVerify.style.display = 'none';
            stepReset.style.display = 'block';
            document.querySelector('.form-main-title').textContent = 'Set New Password';
        });

        // 重置密码逻辑
        resetBtn.addEventListener('click', function() {
            const newPwd = newPwdInput.value;
            const confirmPwd = confirmPwdInput.value;
            const resetMsg = document.getElementById('resetMsg');
            
            // 表单验证
            if(!newPwd || !confirmPwd) {
                resetMsg.textContent = 'Password cannot be empty';
                resetMsg.className = 'form-message error-text';
                return;
            }
            if(newPwd !== confirmPwd) {
                resetMsg.textContent = 'Two passwords do not match';
                resetMsg.className = 'form-message error-text';
                return;
            }
            if(newPwd.length < 6) {
                resetMsg.textContent = 'Password must be at least 6 characters';
                resetMsg.className = 'form-message error-text';
                return;
            }

            // 重置成功
            alert('Password reset successful! Redirecting to login page...');
            window.location.href = 'LoginPage.html';
        });
    </script>
</body>
</html>
